<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dorksense: угадай фильм по эмодзи</title>
    <!-- Пиксельный шрифт для стиля dork/retro -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Глобальный dorksense-стиль: тёмный фон, неон, глитч-эффекты */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b0d1e;
            font-family: 'Press Start 2P', cursive, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            color: #c0f0f0;
            /* лёгкий шум для текстурки */
            background-image: repeating-linear-gradient(45deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 4px);
        }

        /* глитч-оверлей */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 255, 255, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 8px; }
        }

        /* неоновый заголовок с гличем */
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #00ffff, 2px 2px 0 #00ffff;
            letter-spacing: 2px;
            word-break: break-word;
            animation: glitch 3s infinite steps(1);
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            5% { transform: skew(2deg, 1deg); text-shadow: -3px 0 cyan, 3px 0 red; }
            10% { transform: skew(-2deg, -1deg); text-shadow: 2px 0 yellow, -2px 0 blue; }
            15% { transform: skew(0deg, 0deg); text-shadow: 0 0 5px #ff00ff, 0 0 10px #00ffff; }
        }

        /* кнопка в dork-стиле */
        .dork-btn {
            font-family: 'Press Start 2P', cursive;
            background: #10121f;
            color: #0ff;
            border: 3px solid #f0f;
            padding: 12px 24px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 2.5rem;
            box-shadow: 0 0 10px #f0f, 0 0 20px #0ff;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .dork-btn:hover {
            background: #1f1f3f;
            color: #ff99ff;
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            transform: scale(1.02);
        }

        /* сетка карточек */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
            margin-bottom: 2rem;
        }

        /* контейнер карточки с 3D-перспективой */
        .card {
            width: 100%;
            aspect-ratio: 1 / 1; /* квадратная */
            max-width: 320px;
            margin: 0 auto; /* центрирование в ячейке */
            cursor: pointer;
            perspective: 1500px;
            transition: filter 0.3s;
            filter: drop-shadow(0 0 8px cyan);
        }

        .card:hover {
            filter: drop-shadow(0 0 15px magenta);
        }

        /* внутренний вращающийся блок */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 12px;
            box-shadow: 0 0 0 3px #0ff, 0 0 0 6px #10121f;
        }

        /* состояние переворота */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* общие стили для передней и задней стороны */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            box-sizing: border-box;
            border-radius: 10px;
            font-size: 2.2rem;
            line-height: 1.4;
            text-align: center;
            word-break: break-word;
            background: #0d0f1c;
            background-image: radial-gradient(circle at 30% 30%, rgba(255,0,255,0.1) 0%, transparent 50%);
            border: 2px solid #00ffff;
            box-shadow: inset 0 0 20px rgba(0,255,255,0.3);
        }

        /* лицевая сторона: крупные эмодзи */
        .card-front {
            color: #ffccff;
            font-size: 4.5rem; /* эмодзи большие */
            background: #0a0c1a;
            border-color: #ff00ff;
            box-shadow: inset 0 0 30px rgba(255,0,255,0.3);
        }

        /* задняя сторона: название фильма */
        .card-back {
            transform: rotateY(180deg);
            font-size: 1.1rem;
            font-family: 'Press Start 2P', monospace;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            background: #10121f;
            border-color: #00ffff;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* дополнительный стиль для длинных названий */
        .card-back span {
            display: block;
            max-width: 100%;
        }

        /* адаптация для мобильных */
        @media (max-width: 700px) {
            h1 { font-size: 1.4rem; }
            .card-front { font-size: 3rem; }
            .card-back { font-size: 0.8rem; }
            .card { max-width: 280px; }
            .dork-btn { font-size: 0.7rem; padding: 10px 16px; }
        }

        @media (max-width: 450px) {
            .card-front { font-size: 2.8rem; }
            .card-back { font-size: 0.7rem; }
        }

        /* footer */
        .footer {
            margin-top: 3rem;
            color: #63688a;
            font-size: 0.7rem;
            text-shadow: 0 0 2px cyan;
        }
    </style>
</head>
<body>
    <h1>🍿 CINEMA DORKENSE 🎬</h1>
    <button class="dork-btn" id="resetBtn">⟲ СБРОСИТЬ ВСЁ</button>

    <div class="card-grid" id="cardGrid"></div>

    <div class="footer">⚡ кликни по карточке — узнай фильм ⚡</div>

    <script>
        (function() {
            // ---------- данные фильмов: эмодзи (лицевая) + название (оборот) ----------
            const movies = [
                { emoji: "🕊️", title: "Любовь и голуби" },
                { emoji: "🏙️😢🚫", title: "Москва слезам не верит" },
                { emoji: "⛰️👧🔗", title: "Кавказская пленница" },
                { emoji: "💎✋", title: "Бриллиантовая рука" },
                { emoji: "👨🔧👑", title: "Иван Васильевич меняет профессию" },
                { emoji: "🔪💼👨‍🎓", title: "Операция «Ы»" },
                { emoji: "🏢❤️", title: "Служебный роман" },
                { emoji: "🌲👧", title: "Девчата" },
                { emoji: "🎩👑🤝", title: "Джентльмены удачи" },
                { emoji: "❄️🍒", title: "Зимняя вишня" },
                { emoji: "🚗⚠️", title: "Берегись автомобиля" },
                { emoji: "🍊👂", title: "Чебурашка" },
                { emoji: "👴🏻👨🏻‍🦳", title: "Батя. Дед" },
                { emoji: "⛸️❤️", title: "Лёд" },
                { emoji: "👴🏻🚗🔧", title: "Вторая жизнь Уве" },
                { emoji: "🏠🧖‍♂️🥂", title: "Ирония судьбы, или С лёгким паром!" }
            ];

            // контейнер для карточек
            const grid = document.getElementById('cardGrid');

            // функция создания одной карточки
            function createCard(movie) {
                const card = document.createElement('div');
                card.className = 'card';

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-front';
                front.textContent = movie.emoji;   // эмодзи строкой

                const back = document.createElement('div');
                back.className = 'card-back';
                // разбиваем длинное название на строки (для лучшего вида)
                const titleSpan = document.createElement('span');
                titleSpan.textContent = movie.title;
                back.appendChild(titleSpan);

                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);

                // клик для переворота (toggle класса flipped)
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('flipped');
                });

                return card;
            }

            // заполняем сетку карточками
            movies.forEach(m => {
                grid.appendChild(createCard(m));
            });

            // кнопка сброса — убирает класс flipped у всех карточек
            document.getElementById('resetBtn').addEventListener('click', function() {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(card => {
                    card.classList.remove('flipped');
                });
            });

            // опционально: лёгкая рандомная подсветка при загрузке (просто для атмосферы)
        })();
    </script>
</body>
</html>
