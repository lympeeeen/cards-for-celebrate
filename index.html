<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dorksense: угадай фильм по эмодзи (для старшего поколения)</title>
    <!-- Шрифт с хорошей читаемостью (не слишком игровой, но сохраняем стиль) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0f1e; /* тёмно-синий фон */
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
            color: #fff;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 30%);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            color: #FFD700; /* золотой */
            text-shadow: 0 0 10px #FFA500, 0 0 20px #FF4500;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            word-break: break-word;
            text-transform: uppercase;
        }

        /* Кнопка сброса — большая и контрастная */
        .reset-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            background: #FFD700;
            color: #0a0f1e;
            border: 4px solid #fff;
            padding: 20px 50px;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 3rem;
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FF8C00;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .reset-btn:hover {
            background: #FFA500;
            color: #000;
            border-color: #FFD700;
            transform: scale(1.05);
            box-shadow: 0 0 30px #FFA500, 0 0 60px #FF4500;
        }

        /* Контейнер для карточек — одна карточка в строку */
        .cards-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Карточка — широкая, почти на всю ширину */
        .card {
            width: 100%;
            max-width: 950px;
            aspect-ratio: 16 / 9; /* широкий формат */
            cursor: pointer;
            perspective: 2000px;
            filter: drop-shadow(0 0 15px gold);
            transition: filter 0.3s;
        }

        .card:hover {
            filter: drop-shadow(0 0 25px orange);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 30px;
            box-shadow: 0 0 0 5px #FFD700, 0 0 0 10px #0a0f1e;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-radius: 30px;
            text-align: center;
            word-break: break-word;
            background: #0a0f1e;
            border: 6px solid #FFD700;
            box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.5);
        }

        /* Лицевая сторона — огромные эмодзи */
        .card-front {
            font-size: 10rem; /* очень крупно */
            line-height: 1.2;
            color: #fff;
            background: #1a1f30;
            border-color: #FFD700;
            box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.3);
        }

        /* Задняя сторона — название фильма крупным шрифтом */
        .card-back {
            transform: rotateY(180deg);
            font-size: 5rem; /* очень крупно */
            font-weight: 900;
            color: #FFD700;
            background: #0a0f1e;
            border-color: #FFD700;
            text-shadow: 4px 4px 0 #000, 0 0 20px gold;
            line-height: 1.3;
            padding: 2rem;
        }

        /* Адаптация для мобильных (но шрифт остаётся большим) */
        @media (max-width: 700px) {
            h1 { font-size: 2.2rem; }
            .reset-btn { font-size: 1.4rem; padding: 15px 30px; }
            .card-front { font-size: 5rem; }
            .card-back { font-size: 1.8rem; }
        }

        @media (max-width: 450px) {
            .card-front { font-size: 4rem; }
            .card-back { font-size: 1.4rem; }
        }

        .footer {
            margin-top: 4rem;
            color: #aaa;
            font-size: 1.2rem;
            text-align: center;
            text-shadow: 0 0 5px gold;
        }
    </style>
</head>
<body>
    <h1>🎬 УГАДАЙ КИНО ПО ЭМОДЗИ 🎞️</h1>
    <button class="reset-btn" id="resetAll">⟳ СБРОСИТЬ ВСЕ КАРТОЧКИ</button>

    <div class="cards-container" id="cardContainer"></div>

    <div class="footer">👆 нажми на карточку — узнай фильм</div>

    <script>
        (function() {
            // --- Массив фильмов: эмодзи (лицевая) + название (оборот) ---
            // Добавлено более 30 известных фильмов для аудитории 40–70+
            const movies = [
                { emoji: "🕊️💕", title: "Любовь и голуби" },
                { emoji: "🏙️😢🚫", title: "Москва слезам не верит" },
                { emoji: "⛰️👧🔗", title: "Кавказская пленница" },
                { emoji: "💎✋", title: "Бриллиантовая рука" },
                { emoji: "👨🔧👑", title: "Иван Васильевич меняет профессию" },
                { emoji: "🔪💼👨‍🎓", title: "Операция «Ы»" },
                { emoji: "🏢❤️", title: "Служебный роман" },
                { emoji: "🌲👧", title: "Девчата" },
                { emoji: "🎩👑🤝", title: "Джентльмены удачи" },
                { emoji: "❄️🍒", title: "Зимняя вишня" },
                { emoji: "🚗⚠️", title: "Берегись автомобиля" },
                { emoji: "🍊👂", title: "Чебурашка" },
                { emoji: "👴🏻👨🏻‍🦳", title: "Батя. Дед" },
                { emoji: "⛸️❤️", title: "Лёд" },
                { emoji: "👴🏻🚗🔧", title: "Вторая жизнь Уве" },
                { emoji: "🏠🧖‍♂️🥂", title: "Ирония судьбы, или С лёгким паром!" },
                { emoji: "🌊🐎⚔️", title: "Тихий Дон" },
                { emoji: "🌾🔥", title: "Они сражались за Родину" },
                { emoji: "👴🏻👴🏻🔫", title: "Старики-разбойники" },
                { emoji: "🐂💰", title: "Золотой телёнок" },
                { emoji: "👸⛽", title: "Королева бензоколонки" },
                { emoji: "🐯🚢", title: "Полосатый рейс" },
                { emoji: "☀️🏖️➕", title: "Три плюс два" },
                { emoji: "🎫➕", title: "Спортлото-82" },
                { emoji: "✈️🎵", title: "В бой идут одни «старики»" },
                { emoji: "🎖️👨🏻✈️👨🏻✈️", title: "Офицеры" },
                { emoji: "🌅🔫👧🏻", title: "А зори здесь тихие" },
                { emoji: "🚔🔪🌃", title: "Место встречи изменить нельзя" },
                { emoji: "🌪️👩‍🦰💔", title: "Унесённые ветром" },
                { emoji: "🎭😱", title: "Фантомас" },
                { emoji: "🎩🤵🔫", title: "Крёстный отец" },
                { emoji: "🐺👩🏻🕊️", title: "Танцующая с волками" },
                { emoji: "🌸🏭👫", title: "Весна на Заречной улице" },
                { emoji: "🏗️👷‍♂️", title: "Высота" },
                { emoji: "🚣👬👬", title: "Верные друзья" },
                { emoji: "🌻🚜💔", title: "Дело было в Пенькове" }
            ];

            const container = document.getElementById('cardContainer');

            // Функция создания одной карточки
            function createCard(movie) {
                const card = document.createElement('div');
                card.className = 'card';

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-front';
                front.textContent = movie.emoji;

                const back = document.createElement('div');
                back.className = 'card-back';
                back.textContent = movie.title;

                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);

                // Клик для переворота
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('flipped');
                });

                return card;
            }

            // Заполняем контейнер
            movies.forEach(m => {
                container.appendChild(createCard(m));
            });

            // Сброс всех карточек
            document.getElementById('resetAll').addEventListener('click', function() {
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.remove('flipped');
                });
            });
        })();
    </script>
</body>
</html>
